<div style="font-family: Arial, sans-serif; padding: 20px;">
  <h2 style="color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 10px;">🛍️ Nossa Vitrine de Produtos</h2>
  
  <!-- Se os produtos demorarem um milissegundo, mostra isso -->
  @if (produtos.length === 0) {
    <p style="color: #7f8c8d; font-style: italic;">Carregando produtos do banco de dados...</p>
  } @else {
    <!-- Grid que organiza os produtos em cartões na tela -->
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
      
      @for (prod of produtos; track prod.id) {
        <div style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center;">
          <!-- Buscando a imagem do jeito exato do banco: prod.imagemUrl -->
          <img [src]="prod.imagemUrl" alt="{{ prod.nome }}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 4px;" />
          <h3 style="color: #333; font-size: 18px; margin: 10px 0;">{{ prod.nome }}</h3>
          <p style="color: #666; font-size: 14px; height: 40px; overflow: hidden;">{{ prod.descricao }}</p>
          <div style="font-weight: bold; color: #e74c3c; font-size: 20px; margin: 10px 0;">R$ {{ prod.preco }}</div>
          <button (click)="adicionarAoCarrinho(prod)" style="background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold;">
            🛒 Adicionar ao Carrinho
          </button>
        </div>
      }

    </div>
  }
</div>
